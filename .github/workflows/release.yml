name: Build and Release Plugin

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      osd_version:
        description: 'Target OpenSearch Dashboards version'
        required: true
        type: string
      plugin_version:
        description: 'Plugin version override'
        required: false
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Plugin
        uses: actions/checkout@v4

      - name: Configure Versions
        id: versions
        run: |
          DEFAULT_OSD_VER=$(jq -r '.opensearchDashboardsVersion' opensearch_dashboards.json)
          DEFAULT_PLUGIN_VER=$(jq -r '.version' opensearch_dashboards.json)
          
          OSD_VER="${{ inputs.osd_version }}"
          OSD_VER="${OSD_VER:-$DEFAULT_OSD_VER}"
          PLUGIN_VER="${{ inputs.plugin_version }}"
          PLUGIN_VER="${PLUGIN_VER:-$DEFAULT_PLUGIN_VER}"
          
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == *-osd* ]]; then
            PLUGIN_VER=$(echo "${{ github.ref_name }}" | sed -E 's/^v?([^-]+)-osd.*/\1/')
            OSD_VER=$(echo "${{ github.ref_name }}" | sed -E 's/.*-osd(.*)/\1/')
          fi

          # Update the JSON file
          jq --arg osd "$OSD_VER" --arg pv "$PLUGIN_VER" \
            '.opensearchDashboardsVersion = $osd | .version = $pv' \
            opensearch_dashboards.json > tmp.json && mv tmp.json opensearch_dashboards.json
            
          echo "osd_version=$OSD_VER" >> $GITHUB_OUTPUT
          echo "release_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Build Tooling
        run: |
          npm install -g yarn
          yarn add @osd/plugin-helpers@${{ steps.versions.outputs.osd_version }} --dev

      - name: Build Plugin
        run: |
          # Use the locally installed helper to build
          ./node_modules/.bin/osd-plugin-helpers build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versions.outputs.release_tag }}
          files: build/*.zip
          generate_release_notes: true
